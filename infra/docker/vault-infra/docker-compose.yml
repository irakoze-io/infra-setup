version: '3.9'

services:
  # ──────────────────────────────────────────────────────────────
  #  VAULT VOLUME PERMISSIONS INIT CONTAINER
  #  Service Author: Claude Code
  #
  #  WHY THIS EXISTS:
  #  Docker creates named volumes owned by root (uid 0).
  #  The Vault process runs as user "vault" (uid 100, gid 1000)
  #  and cannot write to those directories without this fix.
  #  This container runs once, fixes ownership, then exits.
  #  Vault and vault-agent both depend on it before starting.
  # ──────────────────────────────────────────────────────────────
  infra-init-perms:
    image: busybox:1.36
    container_name: infra-init-perms
    restart: 'no'

    command:
      - "sh"
      - "-c"
      - |
        echo "Fixing volume ownership for vault (uid=100, gid=1000)..."
        chown -R 100:1000 /vault/data
        chown -R 100:1000 /vault/logs
        chown -R 100:1000 /vault/tls
        chown -R 100:1000 /vault/agent/creds
        chown -R 100:1000 /vault/agent/sinks
        chmod 750 /vault/data /vault/logs /vault/agent/sinks
        chmod 700 /vault/agent/creds
        echo "Done."
    volumes:
      - vault_data:/vault/data
      - vault_logs:/vault/logs
      - vault_tls:/vault/tls
      - vault_agent_creds:/vault/agent/creds
      - vault_agent_sinks:/vault/agent/sinks

    networks:
      - vault_net

  vault:
    image: hashicorp/vault:1.21
    container_name: vault
    restart: unless-stopped

    cap_add:
      - IPC_LOCK                                # This prevents memory usage from being swapped to disk

    ports:
      - "${VAULT_PORT:-8200}:8200"              # Port for Vault API + UI
      - "8201:8201"

    environment:
      VAULT_ADDR: http://0.0.0.0:8200
      VAULT_API_ADDR: http://0.0.0.0:8200
      VAULT_CLUSTER_ADDR: "https://vault:8201"
      VAULT_LOG_LEVEL: "info"
      VAULT_LOG_FORMAT: "json"

    volumes:
      - ./vault/config/vault.hcl:/vault/config/vault.hcl:ro
      - ./vault/policies:/vault/policies:ro
      - vault_data:/vault/data
      - vault_logs:/vault/logs
      - vault_tls:/vault/tls:ro

    command: vault server -config=/vault/config/vault.hcl

    healthcheck:
      test:
        - "CMD-SHELL"
        - |
          wget --no-verbose --tries=1 --spider \
          http://127.0.0.1:8200/v1/sys/health?standbyok=true || exit 1
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

    networks:
      - vault_net

    security_opt:
      - no-new-privileges:true

    logging: &default-logging
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  vault-agent:
    image: hashicorp/vault:1.21
    container_name: vault-agent
    restart: unless-stopped

    depends_on:
      vault:
        condition: service_healthy

    cap_add:
      - IPC_LOCK

    environment:
      VAULT_ADDR: "http://vault:8200"

    volumes:
      - ./vault/config/agent.hcl:/vault/config/agent.hcl:ro
      - ./vault/templates:/vault/templates:ro
      - vault_agent_creds:/vault/agent/creds:ro  # role_id + secret_id written by bootstrap script
      - vault_agent_sinks:/vault/agent/sinks     # Rendered secrets; services read from here
      - vault_logs:/vault/logs

    command: vault agent -config=/vault/config/agent.hcl

    networks:
      - vault_net

    security_opt:
      - no-new-privileges:true

    logging: *default-logging

    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 64M

  # ──────────────────────────────────────────────────────────────
  #  SPRING BOOT APP (iown-service)
  #  Mount vault_agent_sinks at /vault/sinks so Spring Cloud Vault
  #  can read the token from /vault/sinks/token (see bootstrap.properties).
  #  Build image first: cd app && mvn spring-boot:build-image -Dspring-boot.build-image.imageName=iown-service:latest
  # ──────────────────────────────────────────────────────────────
  spring-boot-app:
    image: iown-service:latest
    container_name: spring-boot-app
    restart: unless-stopped

    depends_on:
      vault-agent:
        condition: service_started

    environment:
      VAULT_AGENT_HOST: vault-agent
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}

    volumes:
      - vault_agent_sinks:/vault/sinks:ro

    networks:
      - vault_net

    ports:
      - "${SPRING_PORT:-8080}:8080"

# ══════════════════════════════════════════════════════════════════
#  VOLUMES
# ══════════════════════════════════════════════════════════════════
volumes:
  vault_data: # Raft storage — back this up regularly
    driver: local

  vault_logs: # Vault server + audit logs
    driver: local

  vault_tls: # Mount your certs here
    driver: local

  vault_agent_creds: # role_id + secret_id — written by bootstrap
    driver: local

  vault_agent_sinks: # Rendered secrets files — shared with services
    driver: local

# ══════════════════════════════════════════════════════════════════
#  NETWORKS
# ══════════════════════════════════════════════════════════════════
networks:
  vault_net:
    driver: bridge
    internal: false                              # Vault needs to reach out for auto-unseal (AWS/GCP/Azure)

  app_net: # Service-to-service communication
    driver: bridge