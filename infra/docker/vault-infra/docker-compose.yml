version: "3.9"

services:
  # ─────────────────────────────────────────────
  # Vault volume permissions (run before vault; hashicorp/vault image runs as UID 100, GID 1000)
  # ─────────────────────────────────────────────
  vault-data-init:
    image: alpine:3.19
    container_name: vault-data-init
    restart: "no"
    volumes:
      - vault_data:/vault/data
      - vault_logs:/vault/logs
      - vault_agent_sink:/vault/agent
    user: root
    command: ["sh", "-c", "chown -R 100:1000 /vault/data /vault/logs /vault/agent"]
    networks:
      - project_network

  # ─────────────────────────────────────────────
  # HashiCorp Vault (production / server mode)
  # ─────────────────────────────────────────────
  vault:
    image: hashicorp/vault:latest
    container_name: hashicorp-vault
    depends_on:
      vault-data-init:
        condition: service_completed_successfully
    environment:
      VAULT_ADDR: "http://0.0.0.0:8200"          # Used by the vault CLI inside the container
      VAULT_API_ADDR: "http://vault:8200"         # Advertised API address (use HTTPS + real hostname in prod)
      VAULT_CLUSTER_ADDR: "https://vault:8201"
      # VAULT_DEV_ROOT_TOKEN_ID only applies to "vault server -dev"; not used in server mode — root token comes from init.
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
      - "8201:8201"
    volumes:
      # Config mounted rw so image entrypoint can chown; policies/scripts stay ro
      - ./vault/config:/vault/config
      - ./vault/policies:/vault/policies:ro
      - ./vault/scripts:/vault/scripts:ro
      - vault_data:/vault/data
      - vault_logs:/vault/logs
      - vault_agent_sink:/vault/agent
    command: vault server -config=/vault/config/vault.hcl
    env_file:
      - ../env/.env.shared
      - ../env/.env.dev
    healthcheck:
      # We check for initialized=true OR false (basically "is it running?")
      # This allows vault-init to see if it needs to initialize or just unseal.
      test: [ "CMD-SHELL", "vault status -format=json | grep -q 'initialized'" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - project_network

    security_opt:
      - no-new-privileges:true

    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
  # ─────────────────────────────────────────────
  # Vault Init (One-off bootstrap)
  # ─────────────────────────────────────────────
  vault-init:
    image: hashicorp/vault:latest
    container_name: vault-init
    depends_on:
      vault:
        condition: service_healthy
    volumes:
      - ./vault/scripts:/vault/scripts:ro
      - ./vault/policies:/vault/policies:ro
      - vault_agent_sink:/vault/agent
    environment:
      VAULT_ADDR: "http://vault:8200"
      # Writable HOME so Vault CLI can write ~/.vault.log (avoids "Unable to open log: Permission denied")
      HOME: "/tmp"
      INIT_OUTPUT_FILE: "/vault/agent/vault-init-keys.json"
      AGENT_DIR: "/vault/agent"
      # Pass DB env vars for secret writing
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    env_file:
      - ../env/.env.shared
      - ../env/.env.dev
      - ../env/.env.secrets
    entrypoint: [ "/bin/sh", "-c", "apk add --no-cache jq curl && /vault/scripts/init-vault.sh" ]
    networks:
      - project_network

  # ─────────────────────────────────────────────
  # Vault Agent  (sidecar for your Spring Boot app)
  # Optional but recommended — manages token renewal
  # and secret injection transparently
  # ─────────────────────────────────────────────
  vault-agent:
    image: hashicorp/vault:latest
    container_name: vault-agent
    restart: unless-stopped
    depends_on:
      vault-init:
        condition: service_completed_successfully
    cap_add:
      - IPC_LOCK
      - CAP_SETFCAP
    volumes:
      - ./vault/config/agent.hcl:/vault/config/agent.hcl:ro
      - ./vault/config/templates:/vault/config/templates:ro
      - ./vault/scripts/start-vault-agent.sh:/vault/scripts/start-vault-agent.sh:ro
      - vault_agent_sink:/vault/agent                   # Token sink shared with Spring Boot
      - vault_logs:/vault/logs
    environment:
      VAULT_ADDR: "http://vault:8200"
      # Optional fallback for platforms where role_id/secret_id files are not pre-seeded.
      # VAULT_ROLE_ID: "${VAULT_ROLE_ID}"
      # VAULT_SECRET_ID: "${VAULT_SECRET_ID}"
    # command: ["/bin/sh", "/vault/scripts/start-vault-agent.sh"]
    healthcheck:
      test: [ "CMD-SHELL", "test -s /vault/agent/token" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - project_network
    # no-new-privileges removed so Vault agent can set CAP_SETFCAP (required by binary); cap_add limits what it can use
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  pgadmin_volume:
    driver: local
  vault_data:
    driver: local
  vault_logs:
    driver: local
  vault_agent_sink:
    driver: local

networks:
  project_network:
    driver: bridge

